name: build and deploy
run-name: running deployment
on:
  push:
    branches:
      - main
    
permissions:
    id-token: write

env:
  DB_LOCATION: local
  REMOTE_SCHEMA: dev
  DB_LOGGING: off

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout
            uses: actions/checkout@v5
          
          - name: Install requirements
            run: pip install -r requirements.txt

          - name: Run tests
            run:  python3 -m pytest

    deploy:
       runs-on: ubuntu-latest
       needs: test
       steps:
          - name: Checkout
            uses: actions/checkout@v5

          - name: Configure AWS credentials
            uses: aws-actions/configure-aws-credentials@0e613a0980cbf65ed5b322eb7a1e075d28913a83
            with:
              role-to-assume: arn:aws:iam::261219435789:role/github-jbr
              aws-region: eu-west-2

          - name: Get Caller Identity
            run: aws sts get-caller-identity
        
          - name: Login to Amazon ECR
            id: login-ecr
            uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a
            
          - name: Build, tag, and push docker image to Amazon ECR
            run: |
               docker build -t coins-api .
               docker tag jbr/coins-api:latest 261219435789.dkr.ecr.eu-west-2.amazonaws.com/jbr/coins-api:latest
               docker push 261219435789.dkr.ecr.eu-west-2.amazonaws.com/jbr/coins-api:latest
